# desires.sample.conf — DEPRECATED (legacy growth_rate model)
#
# ma-home / koyori の本線は desire-system v2（DESIRE_CONFIGS + ~/.claude/desires.json）。
# 新規セットアップではこのファイルをコピーしないこと。参照用に残している。
#
# 旧書式: name | growth_rate_per_second | prompt_text
#
# 閾値（THRESHOLD）は 0.6 で固定。
# growth_rate の目安（閾値到達までの時間）:
#   3時間 (10800s) → 0.000056
#   6時間 (21600s) → 0.000028
#   24時間 (86400s) → 0.000007
#   48時間 (172800s) → 0.0000035
#
# 空行と # で始まる行は無視される。

