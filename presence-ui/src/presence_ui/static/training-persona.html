<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Persona LoRA 学習データ</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f0eb;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #666;
      --ma: #e8f0ff;
      --koyori: #fff5eb;
      --border: #ddd;
      --danger: #b33;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414;
        --card: #1e1e1e;
        --text: #eee;
        --muted: #aaa;
        --ma: #1a2433;
        --koyori: #2a2218;
        --border: #333;
        --danger: #f66;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem 1.25rem 3rem;
      line-height: 1.55;
    }
    header {
      max-width: 920px;
      margin: 0 auto 1rem;
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.35rem; }
    .meta { color: var(--muted); font-size: 0.9rem; }
    .meta code { font-size: 0.85rem; }
    .stats { margin-top: 0.35rem; }
    .toolbar {
      max-width: 920px;
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    input[type="search"], button, label.select-all {
      font: inherit;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
    }
    label.select-all {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      user-select: none;
    }
    input[type="search"] { flex: 1 1 220px; min-width: 180px; }
    button { cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    button.primary {
      background: #4a6741;
      color: #fff;
      border-color: #3d5536;
    }
    @media (prefers-color-scheme: dark) {
      button.primary {
        background: #5a7a50;
        border-color: #6a8a60;
        color: #f4f4f4;
      }
    }
    details.system {
      max-width: 920px;
      margin: 0 auto 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
    }
    details.system pre {
      white-space: pre-wrap;
      margin: 0.5rem 0 0;
      font-size: 0.85rem;
    }
    #list {
      max-width: 920px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .pair {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
    }
    .pair.rejected {
      opacity: 0.55;
      border-style: dashed;
    }
    .pair-head {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .pair-head input { margin: 0; }
    .pair-head .badge {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--danger);
    }
    .bubble {
      border-radius: 10px;
      padding: 0.65rem 0.8rem;
      margin: 0.35rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ma { background: var(--ma); }
    .bubble.koyori { background: var(--koyori); }
    .label { font-size: 0.78rem; font-weight: 600; opacity: 0.75; margin-bottom: 0.15rem; }
    .empty, .error {
      max-width: 920px;
      margin: 1rem auto;
      padding: 1rem;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
    }
    .error { border-color: #c44; }
    .pager-note {
      color: var(--muted);
      font-size: 0.85rem;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>Persona LoRA 学習データ</h1>
    <p class="meta" id="meta">読み込み中…</p>
    <p class="meta stats" id="stats"></p>
  </header>

  <div class="toolbar pager-toolbar" data-pager="top">
    <button type="button" id="exportBtn" class="primary">会話から再 export</button>
    <input type="search" id="q" placeholder="まー / こより の文面で絞り込み" />
    <label class="select-all"><input type="checkbox" id="selectPage" /> ページ全選択</label>
    <button type="button" id="rejectBtn" class="danger" disabled>選択を学習から除外</button>
    <button type="button" class="pager-prev">← 前</button>
    <button type="button" class="pager-next">次 →</button>
    <button type="button" id="reload">再読込</button>
    <span class="pager-note" id="pagerTop"></span>
  </div>

  <details class="system" id="systemBox" hidden>
    <summary>System（SOUL.core プレビュー）</summary>
    <pre id="systemPreview"></pre>
  </details>

  <div id="list"></div>
  <div id="message" class="empty" hidden></div>

  <div class="toolbar pager-toolbar" data-pager="bottom">
    <button type="button" class="pager-prev">← 前</button>
    <button type="button" class="pager-next">次 →</button>
    <span class="pager-note" id="pagerBottom"></span>
  </div>

  <script>
    const PAGE = 30;
    let offset = 0;
    let total = 0;
    let lastPayload = null;
    const selected = new Map();

    const metaEl = document.getElementById("meta");
    const statsEl = document.getElementById("stats");
    const listEl = document.getElementById("list");
    const msgEl = document.getElementById("message");
    const qEl = document.getElementById("q");
    const systemBox = document.getElementById("systemBox");
    const systemPreview = document.getElementById("systemPreview");
    const selectPageEl = document.getElementById("selectPage");
    const rejectBtn = document.getElementById("rejectBtn");
    const exportBtn = document.getElementById("exportBtn");
    const pagerTop = document.getElementById("pagerTop");
    const pagerBottom = document.getElementById("pagerBottom");
    const prevButtons = document.querySelectorAll(".pager-prev");
    const nextButtons = document.querySelectorAll(".pager-next");

    function showMessage(text, isError) {
      msgEl.hidden = false;
      msgEl.className = isError ? "error" : "empty";
      msgEl.textContent = text;
      listEl.innerHTML = "";
    }

    function hideMessage() {
      msgEl.hidden = true;
    }

    function updateRejectButton() {
      rejectBtn.disabled = selected.size === 0;
      rejectBtn.textContent =
        selected.size > 0
          ? `選択を学習から除外 (${selected.size})`
          : "選択を学習から除外";
    }

    function toggleSelection(pair, checked) {
      const key = pair.fingerprint;
      if (checked) {
        selected.set(key, { user: pair.user, assistant: pair.assistant });
      } else {
        selected.delete(key);
      }
      updateRejectButton();
    }

    function renderPairs(pairs) {
      const q = (qEl.value || "").trim().toLowerCase();
      const filtered = q
        ? pairs.filter((p) =>
            p.user.toLowerCase().includes(q) || p.assistant.toLowerCase().includes(q))
        : pairs;
      listEl.innerHTML = "";
      if (!filtered.length) {
        showMessage(q ? "このページに一致するペアがありません。" : "ペアがありません。");
        syncSelectPageCheckbox(filtered);
        return;
      }
      hideMessage();
      for (const p of filtered) {
        const card = document.createElement("article");
        card.className = "pair" + (p.rejected ? " rejected" : "");

        const head = document.createElement("div");
        head.className = "pair-head";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.disabled = p.rejected;
        cb.checked = selected.has(p.fingerprint);
        cb.addEventListener("change", () => toggleSelection(p, cb.checked));
        const label = document.createElement("span");
        label.textContent = `Pair ${p.index} · JSONL line ${p.line_no}`;
        head.appendChild(cb);
        head.appendChild(label);
        if (p.rejected) {
          const badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = "除外済み";
          head.appendChild(badge);
        }

        const maLabel = document.createElement("div");
        maLabel.className = "label";
        maLabel.textContent = "まー";
        const maBubble = document.createElement("div");
        maBubble.className = "bubble ma";
        maBubble.textContent = p.user;
        const koLabel = document.createElement("div");
        koLabel.className = "label";
        koLabel.textContent = "こより";
        const koBubble = document.createElement("div");
        koBubble.className = "bubble koyori";
        koBubble.textContent = p.assistant;

        card.append(head, maLabel, maBubble, koLabel, koBubble);
        listEl.appendChild(card);
      }
      syncSelectPageCheckbox(filtered);
    }

    function syncSelectPageCheckbox(filtered) {
      const selectable = filtered.filter((p) => !p.rejected);
      if (!selectable.length) {
        selectPageEl.checked = false;
        selectPageEl.indeterminate = false;
        selectPageEl.disabled = true;
        return;
      }
      selectPageEl.disabled = false;
      const selectedOnPage = selectable.filter((p) => selected.has(p.fingerprint)).length;
      selectPageEl.checked = selectedOnPage === selectable.length;
      selectPageEl.indeterminate =
        selectedOnPage > 0 && selectedOnPage < selectable.length;
    }

    function updatePager() {
      const atStart = offset <= 0;
      const atEnd = offset + PAGE >= total;
      prevButtons.forEach((btn) => { btn.disabled = atStart; });
      nextButtons.forEach((btn) => { btn.disabled = atEnd; });
      const from = total ? offset + 1 : 0;
      const to = Math.min(offset + PAGE, total);
      const note = total ? `${from}–${to} / ${total}` : "0 / 0";
      pagerTop.textContent = note;
      pagerBottom.textContent = note;
    }

    async function load() {
      hideMessage();
      metaEl.textContent = "読み込み中…";
      statsEl.textContent = "";
      try {
        const res = await fetch(
          `/api/v1/training/persona?offset=${offset}&limit=${PAGE}`
        );
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        lastPayload = data;
        total = data.candidates_total || 0;
        if (!data.exists) {
          showMessage(
            "学習 JSONL がまだありません。「会話から再 export」で native 会話 JSONL から生成できます。",
            false
          );
          metaEl.textContent = "ファイルなし";
          systemBox.hidden = true;
          updatePager();
          return;
        }
        metaEl.innerHTML = `<code>${data.candidates_path}</code>`;
        statsEl.textContent =
          `候補 ${data.candidates_total} · 学習用 ${data.curated_total} · 除外 ${data.rejected_total}`;
        if (data.system_preview) {
          systemBox.hidden = false;
          systemPreview.textContent =
            data.system_preview +
            (data.system_chars > data.system_preview.length
              ? `\n\n(${data.system_chars} chars total)`
              : "");
        }
        renderPairs(data.pairs);
        updatePager();
      } catch (err) {
        showMessage(String(err), true);
        metaEl.textContent = "読み込み失敗";
      }
    }

    async function exportFromSessions() {
      exportBtn.disabled = true;
      const label = exportBtn.textContent;
      exportBtn.textContent = "export 中…";
      hideMessage();
      try {
        const res = await fetch("/api/v1/training/persona/export", { method: "POST" });
        const data = await res.json();
        if (!data.ok) {
          throw new Error(data.error || "export failed");
        }
        offset = 0;
        selected.clear();
        updateRejectButton();
        await load();
        showMessage(
          `export 完了: セッション ${data.sessions_scanned} · 候補 ${data.pairs_written} 件` +
            `（フィルタ除外 ${data.pairs_skipped}）· 学習用 ${data.curated_total} · 除外 ${data.rejected_total}`,
          false
        );
      } catch (err) {
        showMessage(String(err), true);
      } finally {
        exportBtn.disabled = false;
        exportBtn.textContent = label;
      }
    }

    async function rejectSelected() {
      if (!selected.size) return;
      rejectBtn.disabled = true;
      try {
        const res = await fetch("/api/v1/training/persona/reject", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            pairs: [...selected.values()],
          }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        selected.clear();
        updateRejectButton();
        selectPageEl.checked = false;
        selectPageEl.indeterminate = false;
        await load();
        showMessage(
          `${data.added} 件を除外しました（学習用 ${data.curated_total} 件）`,
          false
        );
      } catch (err) {
        showMessage(String(err), true);
      } finally {
        updateRejectButton();
      }
    }

    selectPageEl.addEventListener("change", () => {
      if (!lastPayload || !lastPayload.pairs) return;
      const q = (qEl.value || "").trim().toLowerCase();
      const pairs = q
        ? lastPayload.pairs.filter((p) =>
            p.user.toLowerCase().includes(q) || p.assistant.toLowerCase().includes(q))
        : lastPayload.pairs;
      for (const p of pairs) {
        if (p.rejected) continue;
        toggleSelection(p, selectPageEl.checked);
      }
      renderPairs(lastPayload.pairs);
    });

    prevButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        offset = Math.max(0, offset - PAGE);
        load();
      });
    });
    nextButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (offset + PAGE < total) {
          offset += PAGE;
          load();
        }
      });
    });
    document.getElementById("reload").addEventListener("click", () => load());
    exportBtn.addEventListener("click", () => exportFromSessions());
    rejectBtn.addEventListener("click", () => rejectSelected());
    qEl.addEventListener("input", () => {
      if (lastPayload && lastPayload.pairs) renderPairs(lastPayload.pairs);
    });

    load();
  </script>
</body>
</html>
