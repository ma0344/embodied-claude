# Koyori kiosk onboard — no auto-show (avoids accessibility dialog on minimal X).

[main]
show-status-icon=false
xembed-onboard=false

[auto-show]
enabled=false
tablet-mode=false

[window]
force-to-top=true

[window.landscape]
dock-expand=true
dock-height=220

[icon-palette]
in-use=true

[keyboard]
key-synth=XTest
